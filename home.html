<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>j0vanwshopsite&trade;</title>
    <link rel="stylesheet" href="home-styles.css" />
    <link rel="stylesheet" href="indexstyles.css" />
    <link rel="stylesheet" href="font.css" />
</head>
<body>

    <header>
        <h1>j0vanwshopsite&trade;</h1>
        <nav class="main-nav">
            <ul class="nav-center">
                <li><a href="/pages/about.html">About</a></li>
                <li><a href="/pages/contact.html">Contact</a></li>
                <li><a href="/pages/shop.html">Shop</a></li>
            <ul class="nav-right">
                <li><a href="/pages/auth/login.html" id="login-link">Log In</a></li>
                <li><a href="/pages/auth/signup.html" id="signup-link">Sign Up</a></li>
                <li> <button id="logout-btn" onclick="logout()" style="display: none;">Log Out</button> </li>
                <li><span id="user-email" style="display: none; font-weight: bold;"></span></li>
            </ul>
        </nav>
    </header>
    <div class="hamburg-btn">
        <li><button onclick="toggleHamburg()">&#9776;</button></li>
    </div>
    <main>
        <section class="hometext">
            <h2>Just a test shop site</h2>
            <p>Test the website and its functions</p>
            <img src="content/img/porsche_black_pfp.jpg" alt="porsche_black_pfp">

            
        </section>
        
    </main>
    <div class="hamburg-menu" id="hamburg-menu">
        <div class="hamburg-header">
            <h2>Menu</h2>
            <button class="hamburg-close" onclick="toggleHamburg()">✖</button>
        </div>
        <div class="hamburg-items">
            <li><a href="/pages/about.html">About</a></li>
            <li><a href="/pages/contact.html">Contact</a></li>
            <li><a href="/pages/shop.html">Shop</a></li>
        </div>
        <div class="hamburg-auth">
            <li><a href="/pages/auth/login.html">Log In</a></li>
            <li><a href="/pages/auth/signup.html">Sign Up</a></li>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 j0vanwshopsite&trade;. All rights reserved.</p>
    </footer>   
    
    <script>
        function toggleHamburg() {
            const hamburgEl= document.getElementById("hamburg-menu");
            hamburgEl.classList.toggle("hamburg-open");
            console.log("Hamburger Toggled", hamburgEl.classList);
        }

        document.addEventListener("click", function (e) {
            const hamburgMenu = document.getElementById("hamburg-menu")
            const hamburgButton = document.querySelector(".hamburg-btn button")

        if (
            hamburgMenu.classList.contains("hamburg-open") &&
            !hamburgMenu.contains(e.target) &&
            !hamburgButton.contains(e.target)
        ) {
            hamburgMenu.classList.remove("hamburg-open")
        }
        });
    </script>
<script type="module">
    import { auth, signOut, onAuthStateChanged } from "./src/firebase.js";
    const { signOut, onAuthStateChanged } = firebaseFunctions;

    window.logout = function() {
        signOut(auth)
            .then(() => {
                alert("You've been logged out.");
                window.location.href = "/pages/login.html";
            })
            .catch((error) => alert("Error logging out: " + error.message));
    };

    onAuthStateChanged(auth, user => {
        const loginLink = document.getElementById("login-link");
        const signupLink = document.getElementById("signup-link");
        const logoutBtn = document.getElementById("logout-btn");
        const userEmail = document.getElementById("user-email");

        if(user) {  
            if(loginLink) loginLink.style.display = "none";
            if(signupLink) signupLink.style.display = "none";
            if(logoutBtn) logoutBtn.style.display = "inline-block";
            
            if (userEmail) {
                userEmail.style.display = "inline-block";
                const name = user.displayNmae || user.email.split("@")[0];
                userEmail.textContent = `👋 Welcome, ${name}`;
            }
        } else {
            if(loginLink) loginLink.style.display = "inline-block";
            if(signupLink) signupLink.style.display = "inline-block";
            if(logoutBtn) logoutBtn.style.display = "none";

            if (userEmail) {
                userEmail.style.display = "none";
                userEmail.textContent = "";
            }
        }
    });
    </script>
</body>
</html>
