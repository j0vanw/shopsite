<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width-device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="signup-style2.css">
  <link rel="stylesheet" href="/font.css">
  <script type="module" src="/scripts/signup.js"></script>
</head>
<body>
  <div class="signup-card">
    <div class="back-button">
      <a href="javascript:history.back()" class="back-button">&#8592;</a>
    </div>
    <h2>Sign Up</h2>
    <div class="input-box">
      <input type="text" id="signupName" placeholder=" " reqired>
      <span>Name</span>
    </div>
    
    <div class="input-box">
      <input type="email" id="signupEmail" placeholder=" " required>
      <span>Email</span>
    </div>
    
    <div class="input-box">
      <input type="password" id="signupPassword" placeholder=" " required>
      <span>Password</span>
    </div>
    <div class="divider"><span>or</span></div>
    <button id="gloginBtn" class="google-btn">
      <img
        src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
        alt="Google Logo"
        class="google-icon"
      >
    </button>
    <div class="ToS">
      <input type="checkbox" id="ToS+PP" name="ToS+PP" required><label for="ToS+PP">
      I have read and accepted the <a href="/content/ToS.html">Terms of Service</a> and <a href="/content/PP.html">Privacy Policy</a>.
      </label>
    </div>
  <button id="signup-btn">Sign Up</button>
    </script>
    <p>Already have an account? <a href="login.html">Log In</a></p>
  </div>
</body>
</html>
