<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In</title>
  <link rel="stylesheet" href="login-style2.css">
  <link rel="stylesheet" href="/font.css">
  <script type="module" src="/firebase.js"></script>

</head>
<body>
  <div class="login-card">
    <div class="back-button">
      <a href="javascript:history.back()" class="back-button">&#8592;</a>
    </div>
    <h2>Log In</h2>
    <div class="input-box">
      <input type="text" id="loginText" placeholder=" " required>
      <span>Username</span>
    </div>
    <div class="input-box">
      <input type="password" id="loginPassword" placeholder=" " required>
      <span>Password</span>
    </div>
    <button id="gloginBtn" class="google-btn">
      <img 
        src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
        alt="Google Logo"
        class="google-icon"
      >
    </button>
    <button id="glogoutBtn" style="display:none;">Logout</button>
    <p id="userInfo"></p>
      <div class="ToS">
        <input type="checkbox" id="ToS" name="ToS" required><label for="ToS">
        I have read and accepted the <a href="/content/ToS.html">Terms Of Service</a> and <a href="/content/PP.html">Privacy Policy</a>.
        </label>
      </div>
    <button id="login-btn" class="login-btn">Log In</button>
    <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
  </div>
</body>
</html>
